<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MOPP — Mosquito & Organism Purification Project</title>
  <style>
    /* ==========================================================================
       RESET & BASE STYLES
       ========================================================================== */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg-dark: #050e09;
      --bg-card: rgba(12, 28, 18, 0.65);
      --border-card: rgba(57, 255, 20, 0.18);
      --border-card-hover: rgba(57, 255, 20, 0.45);
      --text-main: #e2f9e5;
      --text-muted: #83a987;
      --accent-neon: #39ff14;
      --accent-glow: rgba(57, 255, 20, 0.35);
      --accent-dim: #13381a;
      --font-main: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }

    html {
      scroll-behavior: smooth;
      background-color: var(--bg-dark);
      color: var(--text-main);
      font-family: var(--font-main);
      line-height: 1.5;
    }

    body {
      overflow-x: hidden;
      position: relative;
      min-height: 100vh;
    }

    /* Floating Canvas Background */
    #particle-canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      z-index: -1;
      pointer-events: none;
    }

    /* Typography & Core Elements */
    h1, h2, h3, h4 {
      color: #fff;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    a {
      color: var(--accent-neon);
      text-decoration: none;
      transition: all 0.3s ease;
    }

    a:hover {
      text-shadow: 0 0 10px var(--accent-glow);
    }

    /* Glassmorphism Card Style */
    .glass-card {
      background: var(--bg-card);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid var(--border-card);
      border-radius: 20px;
      padding: 2.5rem;
      box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
      transition: transform 0.3s ease, border-color 0.3s ease, box-shadow 0.3s ease;
    }

    .glass-card:hover {
      border-color: var(--border-card-hover);
      box-shadow: 0 12px 40px 0 rgba(57, 255, 20, 0.15);
      transform: translateY(-2px);
    }

    .badge {
      display: inline-block;
      padding: 0.35rem 0.85rem;
      background: var(--accent-dim);
      border: 1px solid var(--accent-neon);
      color: var(--accent-neon);
      font-size: 0.8rem;
      font-weight: 600;
      border-radius: 50px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 1rem;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0.85rem 1.75rem;
      border-radius: 12px;
      font-weight: 600;
      background: var(--accent-neon);
      color: #000;
      border: none;
      cursor: pointer;
      box-shadow: 0 0 15px var(--accent-glow);
      transition: all 0.3s ease;
    }

    .btn:hover {
      transform: scale(1.03);
      box-shadow: 0 0 25px var(--accent-neon);
    }
